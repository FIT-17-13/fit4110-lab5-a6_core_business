version: "3.8"

services:
  # Core Business Policy Engine – API chính
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-core-lab05
    env_file:
      - .env
    environment:
      SERVICE_NAME: core-business
      AI_SERVICE_URL: http://ai-service:9000
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PostgreSQL – lưu trữ alerts và rules khi cần persistence
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-coredb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Vision Mock – giả lập kết quả phân tích hình ảnh (stdlib only, không cần pip)
  ai-service:
    image: python:3.11-slim
    container_name: fit4110-ai-lab05
    working_dir: /service
    volumes:
      - ./src/ai_service:/service
    command: ["python", "main.py"]
    networks:
      - team-internal
    ports:
      - "${AI_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data:
